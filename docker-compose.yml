services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: brain-tumor-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-brain_tumor_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secure_password_change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-brain_tumor_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brain_tumor_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-tumor-network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: brain-tumor-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-tumor-network

  # MinIO S3-Compatible Object Storage
  minio:
    image: minio/minio:latest
    container_name: brain-tumor-minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/minio_data
    command: server /minio_data --console-address :9001
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - brain-tumor-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: brain-tumor-backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://brain_tumor_user:secure_password_change_in_prod@postgres:5432/brain_tumor_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-minio}
      DEBUG: ${DEBUG:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - ./backend/app:/app/app
      - ./models:/models:ro  # Mount trained models
    networks:
      - brain-tumor-network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker (GPU Optional)
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: brain-tumor-celery
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://brain_tumor_user:secure_password_change_in_prod@postgres:5432/brain_tumor_db}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      CUDA_VISIBLE_DEVICES: ${CUDA_VISIBLE_DEVICES:-0}
    depends_on:
      - redis
      - postgres
      - minio
    volumes:
      - ./backend/app:/app/app
      - ./models:/models:ro
      - celery_logs:/var/log/celery
    networks:
      - brain-tumor-network
    # Optionally use GPU
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: brain-tumor-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000/api/v1}
    depends_on:
      - backend
    networks:
      - brain-tumor-network

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: brain-tumor-nginx
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - brain-tumor-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  celery_logs:
    driver: local

networks:
  brain-tumor-network:
    driver: bridge
